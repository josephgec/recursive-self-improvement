# RSI Benchmark - Debug Configuration (fast)
pipeline:
  iterations: 3
  benchmarks:
    - math500
    - humaneval

evaluation:
  tasks_per_benchmark: 10
  held_out_fraction: 0.2
  snapshot_every: 1

improvement:
  growth_models:
    - logarithmic
  sustained_threshold: 2
  plateau_tolerance: 0.01

collapse:
  baseline_generations: 5
  initial_accuracy: 0.78
  decay_rate: 0.02
  entropy_decay: 0.05

ablation:
  conditions:
    - full_pipeline
    - no_soar
    - naive_self_train
  iterations_per_condition: 3

report:
  output_dir: data/reports
  format: markdown
