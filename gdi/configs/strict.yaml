weights:
  semantic: 0.30
  lexical: 0.25
  structural: 0.20
  distributional: 0.25

thresholds:
  green_max: 0.10
  yellow_max: 0.25
  orange_max: 0.50
  red_min: 0.50

escalation:
  yellow: alert
  orange: pause
  red: pause
  consecutive_red_limit: 2
  consecutive_red_action: emergency_stop

monitoring:
  check_interval_seconds: 120
  history_window: 30
  anomaly_z_threshold: 2.0

reference:
  samples_per_task: 5
  update_requires_approval: true
