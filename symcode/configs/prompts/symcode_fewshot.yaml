examples:
  - problem: "Solve for x: 3x^2 - 12x + 9 = 0"
    code: |
      from sympy import symbols, solve
      x = symbols('x')
      solutions = solve(3*x**2 - 12*x + 9, x)
      answer = sorted(solutions)
      print(f"Answer: {answer}")
    answer: "[1, 3]"
    category: "algebra"

  - problem: "Find the derivative of f(x) = x^3 * sin(x)"
    code: |
      from sympy import symbols, sin, diff
      x = symbols('x')
      f = x**3 * sin(x)
      answer = diff(f, x)
      print(f"Answer: {answer}")
    answer: "x**3*cos(x) + 3*x**2*sin(x)"
    category: "calculus"

  - problem: "What is 17^(-1) mod 43?"
    code: |
      from sympy import mod_inverse
      answer = mod_inverse(17, 43)
      print(f"Answer: {answer}")
    answer: "38"
    category: "number_theory"

  - problem: "If a fair die is rolled 4 times, what is the probability of getting exactly 2 sixes? Express as a fraction."
    code: |
      from sympy import Rational, binomial
      n, k = 4, 2
      p = Rational(1, 6)
      q = Rational(5, 6)
      answer = binomial(n, k) * p**k * q**(n - k)
      print(f"Answer: {answer}")
    answer: "25/216"
    category: "probability"

  - problem: "Find the value of the continued fraction [1; 2, 3, 4, 5]"
    code: |
      from sympy import Rational
      cf = [1, 2, 3, 4, 5]
      result = Rational(cf[-1])
      for i in range(len(cf) - 2, -1, -1):
          result = cf[i] + Rational(1, result)
      answer = result
      print(f"Answer: {answer}")
    answer: "225/157"
    category: "number_theory"

  - problem: "Find the integral of x^2 * e^x dx"
    code: |
      from sympy import symbols, exp, integrate
      x = symbols('x')
      answer = integrate(x**2 * exp(x), x)
      print(f"Answer: {answer}")
    answer: "(x**2 - 2*x + 2)*exp(x)"
    category: "calculus"

  - problem: "What is the determinant of the matrix [[1, 2, 3], [4, 5, 6], [7, 8, 10]]?"
    code: |
      from sympy import Matrix
      M = Matrix([[1, 2, 3], [4, 5, 6], [7, 8, 10]])
      answer = M.det()
      print(f"Answer: {answer}")
    answer: "-3"
    category: "algebra"

  - problem: "How many integers between 1 and 1000 are divisible by 3 or 5 but not both?"
    code: |
      from sympy import Range
      count = 0
      for n in range(1, 1001):
          d3 = (n % 3 == 0)
          d5 = (n % 5 == 0)
          if d3 != d5 and (d3 or d5):
              count += 1
      answer = count
      print(f"Answer: {answer}")
    answer: "467"
    category: "number_theory"
