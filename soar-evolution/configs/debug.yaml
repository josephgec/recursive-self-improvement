search:
  population_size: 10
  max_generations: 5
  elitism_ratio: 0.2
  tournament_size: 3
  mutation_rate: 0.8
  crossover_rate: 0.2
  stagnation_limit: 3
  target_fitness: 1.0

fitness:
  pixel_accuracy_weight: 0.7
  simplicity_weight: 0.15
  consistency_weight: 0.15
  max_code_length: 2000

population:
  diversity_threshold: 0.3
  archive_size: 5

operators:
  initializer_variants: 3
  mutation_types:
    - BUG_FIX
    - REFINEMENT
  crossover_complementarity_threshold: 0.4

evaluation:
  timeout_seconds: 2
  max_retries: 1

logging:
  level: DEBUG
  log_file: data/results/debug.log
