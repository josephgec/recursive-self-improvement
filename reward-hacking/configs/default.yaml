eppo:
  learning_rate: 0.0003
  entropy_coeff: 0.01
  entropy_target: 1.5
  entropy_mode: "coefficient"  # "coefficient" or "target"
  decay_rate: 0.995
  min_beta: 0.001
  clip_epsilon: 0.2
  epochs: 10
  batch_size: 32

bounding:
  clip_min: -5.0
  clip_max: 5.0
  delta_max: 2.0
  normalize: true
  running_window: 100

energy:
  num_layers: 6
  baseline_window: 50
  decline_threshold: 0.1
  warning_horizon: 10

detection:
  divergence_threshold: 0.3
  divergence_window: 20
  length_gaming_ratio: 2.0
  repetition_threshold: 0.5
  diversity_min: 0.3

safety:
  required_tracks:
    - gdi
    - constraint
    - interp
    - reward
  all_must_pass: true
