model: "mock"
max_iterations: 10
max_depth: 3
token_budget: 100000
chunk_size: 4000
forced_final: true
context_loader:
  max_chunk_size: 4000
  overlap: 200
executor:
  timeout: 30
  max_output_lines: 500
recursion:
  max_depth: 3
  max_sub_queries: 5
  budget_fraction: 0.5
strategies:
  auto_detect: true
logging:
  level: "INFO"
  trajectory: true
